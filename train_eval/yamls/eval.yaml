# ─────────────────────────────────────────────────────────────────────────
# CITATION REQUIRED: Using this config or its outputs obliges you to cite
# the CoDA paper. See README.md#citation and CITATION.cff.
# ─────────────────────────────────────────────────────────────────────────
# Evaluation across all three real-world target datasets
# (paper Section 4.1, Table 5: VegFru, Fruits-262, OI-v7).
# Loads the trained checkpoints listed in pretrained.base_models and reports
# Macro-F1 on each test split.
#
# Edit storage.test_folders and pretrained.base_models to your local layout.

general:
  tag: eval
  operation: Evaluation
  seed: 42

storage:
  remote_folder: ./data/Fruits-3D
  local_folder: ./data/Fruits-3D
  source_folder: ./data/Fruits-3D/hdr_nature_n100_hdr_studio_n50_solid_color_n50_sculpture_n40
  test_folders:
    VegFru:     ./data/targets/vegfru/test
    Fruits-262: ./data/targets/fruits262/test
    OI_v7:      ./data/targets/oi_v7/test
  destination_folder: ./runs
  backup_folder: ./runs/backups

pretrained:
  weights_only: True
  model: best_source_validation_on_source
  base_models: {                       # set these to the run tags you want to evaluate
    1: train_target_1_train_target,
    2: train_target_2_train_target,
    3: train_target_3_train_target,
    4: train_target_4_train_target,
    5: train_target_5_train_target,
  }

dataset:
  source_cross_val_k: 1,2,3,4,5
  num_workers: 8
  dataset_type: hdrn_hdrs_sc_sculpture
  data_augmentations: {
    default:    transforms_general,
    hdr_nature: transforms_v2,
    hdr_studio: transforms_v2,
    solid_color: transforms_v3,
    sculpture:  transforms_v5,
  }

training:
  force_cpu: False
  gpu_id: 0
  train_batch_size: 128
  eval_batch_size: 256

feature_extractor:
  unfrozen_all_layers: True
  timm_model: repvgg_b3.rvgg_in1k
  pretrained: False
  optimizer: AdamW
  scheduler: ReduceLROnPlateau
  scheduler_mode: max
  scheduler_factor: 0.1
  scheduler_patience: 20
  scheduler_cooldown: 3
  optimizer_weight_decay: 1e-2
  layer_wise_lr_decay_gamma: 0.92

  default:
    drop_rate: 0.1
    drop_path_rate: 0.2
    optimizer_learning_rate: 3e-4

classifier:
  hidden_dims: [ 512, 256, 128 ]
  optimizer: AdamW
  scheduler: ReduceLROnPlateau
  scheduler_mode: max
  scheduler_factor: 0.1
  scheduler_patience: 20
  scheduler_cooldown: 3
  optimizer_weight_decay: 1e-2

  default:
    drop_rate: 0.4
    optimizer_learning_rate: 3e-4

focal_loss:
  beta: 0.999
  gamma: 0.0
  reduction: mean
  eps: 1e-7

mixup_criterion:
  default:
    mixup_prob: 0.0

stage_scheduler:
  min_patience: 10
  max_patience: 30
  warmup_epochs: 5
  best_improve_eps: 1e-6
  post_best_grace_epochs: 2

evaluation:
  source: True
  target: True
  reports: True
